# Cloudflare Worker config for the JetLag Hide and Seek multiplayer
# backend. Holds one Durable Object class — `GameRoom` — that backs
# every live game (one DO instance per 6-char game code).
#
# Lives inside `worker/` (rather than at the repo root) so Cloudflare's
# auto-build for the frontend Worker `jetlaghideandseek` doesn't pick
# it up by mistake — that build is connected to the same GitHub repo
# and would otherwise try to deploy the backend instead of the Astro
# site.
#
# Deploy from `worker/` with:
#
#     pnpm run deploy        # = wrangler deploy --config wrangler.toml
#
# The explicit `--config` is REQUIRED. Without it, wrangler's config
# auto-discovery walks up and grabs the repo-root `wrangler.jsonc`
# (the FRONTEND config, with assets.directory = dist) and the deploy
# fails with "assets.directory ... does not exist". Always name this
# file explicitly.
#
# Cloudflare Workers Builds setup for this worker:
#   • Root directory: worker
#   • Deploy command: npx wrangler deploy --config wrangler.toml
#
# After first deploy you'll get a workers.dev URL like
# `https://jlhs-multiplayer.<your-subdomain>.workers.dev`. Bake that
# into the client's PUBLIC_MULTIPLAYER_URL env var (see MULTIPLAYER.md).

name = "jlhs-multiplayer"
main = "index.ts"
compatibility_date = "2024-11-12"
compatibility_flags = ["nodejs_compat"]

# Single Durable Object binding for the game-room class. The binding
# name here (`GAME_ROOM`) is what worker code references via
# `env.GAME_ROOM.idFromName(...)`.
[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"

# Migration for the new DO class. Cloudflare requires this to be
# explicitly declared on first deploy so future schema changes have
# a known starting point.
#
# `new_sqlite_classes` (rather than `new_classes`) uses the SQLite
# storage backend, which is required for Durable Objects on the free
# Workers plan and is also the recommended default for new DOs.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]

# Tighten CORS to the production Pages origin in prod, but allow
# localhost during dev. The worker reads this and echoes it back as
# Access-Control-Allow-Origin.
[vars]
ALLOWED_ORIGINS = "https://jetlaghideandseek.karl-mj-andersson.workers.dev,http://localhost:4321,http://localhost:3000"

# Observability — logs in the Cloudflare dashboard. Free tier limits
# apply; safe defaults.
[observability]
enabled = true
