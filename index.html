<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <!-- Force a secure context. Geolocation, crypto.subtle (the beta
             gate hashes the access code with it) and the service worker
             ALL require https; on a custom domain whose "Always Use
             HTTPS" edge setting isn't enabled, an http visit loads the
             app but silently breaks those (the beta code is rejected, GPS
             never resolves). Upgrade BEFORE the bundle loads so the app
             only ever runs over https. No loop: only fires on http:, and
             localhost is exempt for dev. -->
        <script>
            (function () {
                var l = window.location;
                if (
                    l.protocol === "http:" &&
                    l.hostname !== "localhost" &&
                    l.hostname !== "127.0.0.1"
                ) {
                    l.replace(
                        "https://" +
                            l.host +
                            l.pathname +
                            l.search +
                            l.hash,
                    );
                }
            })();
        </script>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, viewport-fit=cover"
        />
        <!-- v469: SVG mark (red pyramid + white circle, box-cover style)
             is preferred by modern browsers; the .ico / PNG fallbacks
             below cover older browsers + the PWA home-screen icon. -->
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link rel="icon" type="image/x-icon" href="/favicon.ico" />
        <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/apple-touch-icon.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="/favicon-32x32.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="16x16"
            href="/favicon-16x16.png"
        />

        <!-- PWA / standalone-app metas. iOS doesn't read the
             manifest's `theme_color` / `display`, so we mirror them
             via these older Apple-specific meta tags so the app
             launches full-screen with the right status-bar tint when
             installed from the Home Screen. The viewport-fit=cover
             above pairs with `env(safe-area-inset-*)` styles so notch
             devices use the full screen too. -->
        <meta name="theme-color" content="#1F2F3F" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"

        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="application-name" content="Hide+Seek" />

        <!--
          GPS spoof for local development. Lets you test GPS-dependent
          flows without a real device. Runs only when serving from
          localhost AND the user has explicitly set the
          `__jlhs_gpsSpoof` localStorage key. Production deploys
          never trip this.

          Two schemas supported (see the docs in Layout.astro before
          this file was deleted — same shape):

          (A) Single-position spoof — every call returns the same
              simulated walker:
            localStorage.setItem('__jlhs_gpsSpoof', JSON.stringify({
              centerLat: 59.3293, centerLng: 18.0686,
              radiusM: 500, speedMps: 1.39,
            }));
            location.reload();

          (B) Role-aware spoof — seeker / hider keys; the active
              role drives which walker is returned.
        -->
        <script>
            (function () {
                if (
                    !/^(localhost|127\.0\.0\.1|\[::1\])$/.test(
                        window.location.hostname,
                    )
                )
                    return;
                let cfg;
                try {
                    cfg = JSON.parse(localStorage.getItem("__jlhs_gpsSpoof"));
                } catch (e) {
                    return;
                }
                if (!cfg || typeof cfg !== "object") return;

                const buildWalker = function (entry) {
                    if (!entry || typeof entry !== "object") return null;
                    const CENTER = {
                        lat: Number(entry.centerLat),
                        lng: Number(entry.centerLng),
                    };
                    if (
                        !Number.isFinite(CENTER.lat) ||
                        !Number.isFinite(CENTER.lng)
                    )
                        return null;
                    const RADIUS_M = Number(entry.radiusM) || 500;
                    const SPEED_MPS = Number.isFinite(Number(entry.speedMps))
                        ? Number(entry.speedMps)
                        : 1.39;
                    const M_PER_DEG_LAT = 111000;
                    const M_PER_DEG_LNG =
                        111000 * Math.cos((CENTER.lat * Math.PI) / 180);
                    const RADIUS_DEG_LAT = RADIUS_M / M_PER_DEG_LAT;
                    const RADIUS_DEG_LNG = RADIUS_M / M_PER_DEG_LNG;
                    const OMEGA =
                        RADIUS_M > 0 && SPEED_MPS > 0
                            ? SPEED_MPS / RADIUS_M
                            : 0;
                    const start = Date.now();
                    return {
                        center: CENTER,
                        radiusMeters: RADIUS_M,
                        speedMps: SPEED_MPS,
                        positionAt: function (when) {
                            const elapsed = (when - start) / 1000;
                            const angle = OMEGA * elapsed;
                            return {
                                coords: {
                                    latitude:
                                        CENTER.lat +
                                        RADIUS_DEG_LAT * Math.cos(angle),
                                    longitude:
                                        CENTER.lng +
                                        RADIUS_DEG_LNG * Math.sin(angle),
                                    heading:
                                        ((((angle * 180) / Math.PI + 90) %
                                            360) +
                                            360) %
                                        360,
                                    accuracy: 12,
                                    altitude: 22,
                                    altitudeAccuracy: 5,
                                    speed: SPEED_MPS,
                                },
                                timestamp: when,
                            };
                        },
                    };
                };

                const seekerWalker = cfg.seeker
                    ? buildWalker(cfg.seeker)
                    : null;
                const hiderWalker = cfg.hider ? buildWalker(cfg.hider) : null;
                const singleWalker =
                    !seekerWalker && !hiderWalker ? buildWalker(cfg) : null;

                if (!seekerWalker && !hiderWalker && !singleWalker) return;

                const readRole = function () {
                    const raw = localStorage.getItem("playerRole");
                    if (!raw) return "seeker";
                    try {
                        const parsed = JSON.parse(raw);
                        if (parsed === "hider") return "hider";
                        if (parsed === "seeker") return "seeker";
                    } catch (e) {}
                    if (raw === "hider" || raw === '"hider"') return "hider";
                    return "seeker";
                };

                const positionFor = function (when) {
                    const role = readRole();
                    const walker =
                        role === "hider"
                            ? hiderWalker || singleWalker || seekerWalker
                            : seekerWalker || singleWalker || hiderWalker;
                    return walker.positionAt(when);
                };

                const watchIntervals = new Map();
                let nextWatchId = 9000;

                Object.defineProperty(navigator.geolocation, "getCurrentPosition", {
                    value: function (success) {
                        setTimeout(function () {
                            success(positionFor(Date.now()));
                        }, 80);
                    },
                    configurable: true,
                    writable: true,
                });
                Object.defineProperty(navigator.geolocation, "watchPosition", {
                    value: function (success) {
                        const id = nextWatchId++;
                        setTimeout(function () {
                            success(positionFor(Date.now()));
                        }, 80);
                        const handle = setInterval(function () {
                            success(positionFor(Date.now()));
                        }, 2000);
                        watchIntervals.set(id, handle);
                        return id;
                    },
                    configurable: true,
                    writable: true,
                });
                Object.defineProperty(navigator.geolocation, "clearWatch", {
                    value: function (id) {
                        const h = watchIntervals.get(id);
                        if (h !== undefined) {
                            clearInterval(h);
                            watchIntervals.delete(id);
                        }
                    },
                    configurable: true,
                    writable: true,
                });

                if (navigator.permissions && navigator.permissions.query) {
                    const orig = navigator.permissions.query.bind(
                        navigator.permissions,
                    );
                    Object.defineProperty(navigator.permissions, "query", {
                        value: function (d) {
                            if (d && d.name === "geolocation") {
                                return Promise.resolve({
                                    state: "granted",
                                    onchange: null,
                                    addEventListener: function () {},
                                    removeEventListener: function () {},
                                    dispatchEvent: function () {
                                        return false;
                                    },
                                });
                            }
                            return orig(d);
                        },
                        configurable: true,
                        writable: true,
                    });
                }

                window.__gpsSpoof = {
                    schema:
                        seekerWalker || hiderWalker ? "role-aware" : "single",
                    seeker: seekerWalker,
                    hider: hiderWalker,
                    single: singleWalker,
                };
                console.log("[gps-spoof] active", window.__gpsSpoof);
            })();
        </script>
        <!--
            Theme system: src/lib/theme.ts adds a `light` / `dark`
            class to the <html> element on boot (before React mounts)
            based on the persisted preference, defaulting to the OS's
            `prefers-color-scheme`. The early inline script below
            paints the same class synchronously so first paint never
            flashes the wrong palette while the JS module is being
            parsed.
        -->
        <script>
            (function () {
                try {
                    var pref =
                        localStorage.getItem("jlhs:theme") || "system";
                    var mode =
                        pref === "light" || pref === "dark"
                            ? pref
                            : window.matchMedia &&
                                window.matchMedia(
                                    "(prefers-color-scheme: dark)",
                                ).matches
                              ? "dark"
                              : "light";
                    document.documentElement.classList.add(mode);
                    document.documentElement.style.colorScheme = mode;
                } catch (e) {
                    document.documentElement.classList.add("dark");
                }
            })();
        </script>
    </head>
    <body>
        <div id="root"></div>
