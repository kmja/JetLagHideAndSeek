        <meta charset="UTF-8" />
        <!-- Force a secure context. Geolocation, crypto.subtle (the beta
             gate hashes the access code with it) and the service worker
             ALL require https; on a custom domain whose "Always Use
             HTTPS" edge setting isn't enabled, an http visit loads the
             app but silently breaks those (the beta code is rejected, GPS
             never resolves). Upgrade BEFORE the bundle loads so the app
             only ever runs over https. No loop: only fires on http:, and
             localhost is exempt for dev. -->
        <script>
            (function () {
                var l = window.location;
                if (
                    l.protocol === "http:" &&
                    l.hostname !== "localhost" &&
                    l.hostname !== "127.0.0.1"
                ) {
                    l.replace(
                        "https://" +
                            l.host +
                            l.pathname +
                            l.search +
                            l.hash,
                    );
                }
            })();
        </script>
        <!-- maximum-scale=1 + user-scalable=no stop the *page* from
             pinch / double-tap zooming (the map keeps its own zoom — that's
             handled inside MapLibre's canvas, not page-level). Covers
             Android + desktop browsers; iOS Safari ignores user-scalable,
             so the inline script below also blocks its gesture events. -->
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
        />
        <script>
            // iOS Safari ignores `user-scalable=no`, so block its page
            // pinch-zoom gesture events directly. These are Safari-only
            // events that fire ON TOP of touch events; MapLibre's pinch is
            // driven by touch events, not these, so the map still zooms.
            (function () {
                var stop = function (e) {
                    e.preventDefault();
                };
                ["gesturestart", "gesturechange", "gestureend"].forEach(
                    function (t) {
                        document.addEventListener(t, stop, { passive: false });
                    },
                );
                // Kill the iOS double-tap-to-zoom on the page chrome, but
                // NOT on the map (its own double-tap zoom must keep working).
                // Only a real double-tap counts: two taps within 300 ms AND
                // in nearly the same spot — so two quick taps on different
                // controls aren't swallowed.
                var lastTime = 0;
                var lastX = 0;
                var lastY = 0;
                document.addEventListener(
                    "touchend",
                    function (e) {
                        var t = e.changedTouches && e.changedTouches[0];
                        var now = Date.now();
                        var x = t ? t.clientX : 0;
                        var y = t ? t.clientY : 0;
                        var sameSpot =
                            Math.abs(x - lastX) < 30 &&
                            Math.abs(y - lastY) < 30;
                        if (
                            now - lastTime <= 300 &&
                            sameSpot &&
                            !(
                                e.target &&
                                e.target.closest &&
                                e.target.closest(".maplibregl-map")
                            )
                        ) {
                            e.preventDefault();
                        }
                        lastTime = now;
                        lastX = x;
                        lastY = y;
                    },
                    { passive: false },
                );
            })();
        </script>

        <!--
          GPS spoof for local development. Lets you test GPS-dependent
          flows without a real device. Runs only when serving from
          localhost AND the user has explicitly set the
          `__jlhs_gpsSpoof` localStorage key. Production deploys
          never trip this.

          Two schemas supported (see the docs in Layout.astro before
          this file was deleted — same shape):

          (A) Single-position spoof — every call returns the same
              simulated walker:
            localStorage.setItem('__jlhs_gpsSpoof', JSON.stringify({
              centerLat: 59.3293, centerLng: 18.0686,
              radiusM: 500, speedMps: 1.39,
            }));
            location.reload();

          (B) Role-aware spoof — seeker / hider keys; the active
              role drives which walker is returned.
        -->
        <script>
            (function () {
                if (
                    !/^(localhost|127\.0\.0\.1|\[::1\])$/.test(
                        window.location.hostname,
                    )
                )
                    return;
                let cfg;
                try {
                    cfg = JSON.parse(localStorage.getItem("__jlhs_gpsSpoof"));
                } catch (e) {
                    return;
                }
                if (!cfg || typeof cfg !== "object") return;

                const buildWalker = function (entry) {
                    if (!entry || typeof entry !== "object") return null;
                    const CENTER = {
                        lat: Number(entry.centerLat),
                        lng: Number(entry.centerLng),
                    };
                    if (
                        !Number.isFinite(CENTER.lat) ||
                        !Number.isFinite(CENTER.lng)
                    )
                        return null;
                    const RADIUS_M = Number(entry.radiusM) || 500;
                    const SPEED_MPS = Number.isFinite(Number(entry.speedMps))
                        ? Number(entry.speedMps)
                        : 1.39;
                    const M_PER_DEG_LAT = 111000;
                    const M_PER_DEG_LNG =
                        111000 * Math.cos((CENTER.lat * Math.PI) / 180);
                    const RADIUS_DEG_LAT = RADIUS_M / M_PER_DEG_LAT;
                    const RADIUS_DEG_LNG = RADIUS_M / M_PER_DEG_LNG;
                    const OMEGA =
                        RADIUS_M > 0 && SPEED_MPS > 0
                            ? SPEED_MPS / RADIUS_M
                            : 0;
                    const start = Date.now();
                    return {
                        center: CENTER,
                        radiusMeters: RADIUS_M,
                        speedMps: SPEED_MPS,
                        positionAt: function (when) {
                            const elapsed = (when - start) / 1000;
                            const angle = OMEGA * elapsed;
                            return {
                                coords: {
                                    latitude:
                                        CENTER.lat +
                                        RADIUS_DEG_LAT * Math.cos(angle),
                                    longitude:
                                        CENTER.lng +
                                        RADIUS_DEG_LNG * Math.sin(angle),
                                    heading:
                                        ((((angle * 180) / Math.PI + 90) %
                                            360) +
                                            360) %
                                        360,
                                    accuracy: 12,
                                    altitude: 22,
                                    altitudeAccuracy: 5,
                                    speed: SPEED_MPS,
                                },
                                timestamp: when,
                            };
                        },
                    };
                };

                const seekerWalker = cfg.seeker
                    ? buildWalker(cfg.seeker)
                    : null;
                const hiderWalker = cfg.hider ? buildWalker(cfg.hider) : null;
                const singleWalker =
                    !seekerWalker && !hiderWalker ? buildWalker(cfg) : null;

                if (!seekerWalker && !hiderWalker && !singleWalker) return;

                const readRole = function () {
                    const raw = localStorage.getItem("playerRole");
                    if (!raw) return "seeker";
                    try {
                        const parsed = JSON.parse(raw);
                        if (parsed === "hider") return "hider";
                        if (parsed === "seeker") return "seeker";
                    } catch (e) {}
                    if (raw === "hider" || raw === '"hider"') return "hider";
                    return "seeker";
                };

                const positionFor = function (when) {
                    const role = readRole();
                    const walker =
                        role === "hider"
                            ? hiderWalker || singleWalker || seekerWalker
                            : seekerWalker || singleWalker || hiderWalker;
                    return walker.positionAt(when);
                };

                const watchIntervals = new Map();
                let nextWatchId = 9000;

                Object.defineProperty(navigator.geolocation, "getCurrentPosition", {
                    value: function (success) {
                        setTimeout(function () {
                            success(positionFor(Date.now()));
                        }, 80);
                    },
                    configurable: true,
                    writable: true,
                });
                Object.defineProperty(navigator.geolocation, "watchPosition", {
                    value: function (success) {
                        const id = nextWatchId++;
                        setTimeout(function () {
                            success(positionFor(Date.now()));
                        }, 80);
                        const handle = setInterval(function () {
                            success(positionFor(Date.now()));
                        }, 2000);
                        watchIntervals.set(id, handle);
                        return id;
                    },
                    configurable: true,
                    writable: true,
                });
                Object.defineProperty(navigator.geolocation, "clearWatch", {
                    value: function (id) {
                        const h = watchIntervals.get(id);
                        if (h !== undefined) {
                            clearInterval(h);
                            watchIntervals.delete(id);
                        }
                    },
                    configurable: true,
                    writable: true,
                });

                if (navigator.permissions && navigator.permissions.query) {
                    const orig = navigator.permissions.query.bind(
                        navigator.permissions,
                    );
                    Object.defineProperty(navigator.permissions, "query", {
                        value: function (d) {
                            if (d && d.name === "geolocation") {
                                return Promise.resolve({
                                    state: "granted",
                                    onchange: null,
                                    addEventListener: function () {},
                                    removeEventListener: function () {},
                                    dispatchEvent: function () {
                                        return false;
                                    },
                                });
                            }
                            return orig(d);
                        },
                        configurable: true,
                        writable: true,
                    });
                }

                window.__gpsSpoof = {
                    schema:
                        seekerWalker || hiderWalker ? "role-aware" : "single",
                    seeker: seekerWalker,
                    hider: hiderWalker,
                    single: singleWalker,
                };
                console.log("[gps-spoof] active", window.__gpsSpoof);
            })();
        </script>
        <!--
            Theme system: src/lib/theme.ts adds a `light` / `dark`
            class to the <html> element on boot (before React mounts)
            based on the persisted preference, defaulting to the OS's
            `prefers-color-scheme`. The early inline script below
            paints the same class synchronously so first paint never
            flashes the wrong palette while the JS module is being
            parsed.
        -->
        <script>
            (function () {
                try {
                    var pref =
                        localStorage.getItem("jlhs:theme") || "system";
                    var mode =
                        pref === "light" || pref === "dark"
                            ? pref
                            : window.matchMedia &&
                                window.matchMedia(
                                    "(prefers-color-scheme: dark)",
                                ).matches
                              ? "dark"
                              : "light";
                    document.documentElement.classList.add(mode);
                    document.documentElement.style.colorScheme = mode;
                } catch (e) {
                    document.documentElement.classList.add("dark");
                }
            })();
        </script>

        <div id="root"></div>
        <!--
            Boot watchdog + one-shot self-heal. An installed PWA whose
            service worker is serving a STALE app shell (an index that
            references chunk hashes the latest deploy already replaced)
            fails to load the entry bundle → React never mounts → BLANK
            screen, and no in-app error boundary can help because no app
            code ran. This is exactly the "Chrome PWA shows a black/white
            screen while the browser works" report. main.tsx sets
            window.__APP_BOOTED once it executes; if that never happens
            (or a script/chunk load errors before boot), we drop the
            service worker + all caches and hard-reload ONCE into a fresh,
            consistent shell. Guarded by sessionStorage so it can never
            loop. Must run BEFORE the module script so its error listeners
            are armed when the entry bundle loads.
        -->
        <script>
            (function () {
                var HEAL_KEY = "__jlhs_bootHeal";
                var BOOT_TIMEOUT_MS = 12000;
                var healing = false;

                function selfHeal(reason) {
                    if (healing || window.__APP_BOOTED) return;
                    // Only self-heal once per session — if a fresh shell
                    // STILL fails to boot, don't loop; leave it so the user
                    // (or the error UI) can act.
                    try {
                        if (sessionStorage.getItem(HEAL_KEY)) return;
                        sessionStorage.setItem(HEAL_KEY, String(Date.now()));
                    } catch (e) {}
                    healing = true;
                    try {
                        console.warn("[boot-heal] recovering:", reason);
                    } catch (e) {}
                    var reloaded = false;
                    var reload = function () {
                        if (reloaded) return;
                        reloaded = true;
                        window.location.reload();
                    };
                    var jobs = [];
                    try {
                        if ("serviceWorker" in navigator) {
                            jobs.push(
                                navigator.serviceWorker
                                    .getRegistrations()
                                    .then(function (rs) {
                                        return Promise.all(
                                            rs.map(function (r) {
                                                return r.unregister();
                                            }),
                                        );
                                    })
                                    .catch(function () {}),
                            );
                        }
                    } catch (e) {}
                    try {
                        if (window.caches && caches.keys) {
                            jobs.push(
                                caches
                                    .keys()
                                    .then(function (keys) {
                                        return Promise.all(
                                            keys.map(function (k) {
                                                return caches.delete(k);
                                            }),
                                        );
                                    })
                                    .catch(function () {}),
                            );
                        }
                    } catch (e) {}
                    Promise.all(jobs).then(reload, reload);
                    // Safety net if the cleanup promises hang.
                    setTimeout(reload, 3500);
                }

                var watchdog = setTimeout(function () {
                    selfHeal("watchdog timeout (app never mounted)");
                }, BOOT_TIMEOUT_MS);

                window.__cancelBootWatchdog = function () {
                    clearTimeout(watchdog);
                    // Boot succeeded — clear the one-shot guard so a FUTURE
                    // failure in a later session can heal again.
                    try {
                        sessionStorage.removeItem(HEAL_KEY);
                    } catch (e) {}
                };

                // Fast path: a script / module-chunk load error before boot
                // means the shell is broken — heal now instead of waiting out
                // the full timeout. Capture phase so resource-load errors on
                // the <script> element are seen.
                window.addEventListener(
                    "error",
                    function (e) {
                        if (window.__APP_BOOTED) return;
                        var tgt = e && e.target;
                        // Only a failed SCRIPT (the entry bundle / a JS
                        // chunk) is treated as a broken shell. A failed LINK
                        // (Google Fonts, a stylesheet) is non-fatal and must
                        // NOT trigger a cache-clearing reload.
                        var isResource = tgt && tgt.tagName === "SCRIPT";
                        var msg =
                            (e &&
                                (e.message ||
                                    (e.error && e.error.message))) ||
                            "";
                        if (
                            isResource ||
                            /Loading chunk|dynamically imported module|Importing a module script failed|Loading CSS chunk/i.test(
                                msg,
                            )
                        ) {
                            selfHeal(
                                "script/chunk load error: " +
                                    (msg || "resource"),
                            );
                        }
                    },
                    true,
                );

                window.addEventListener("unhandledrejection", function (e) {
                    if (window.__APP_BOOTED) return;
                    var msg =
                        (e &&
                            e.reason &&
                            (e.reason.message || String(e.reason))) ||
                        "";
                    if (
                        /Loading chunk|dynamically imported module|Importing a module script failed/i.test(
                            msg,
                        )
                    ) {
                        selfHeal("unhandled rejection: " + msg);
                    }
                });
            })();
        </script>
        <script type="module" src="/src/main.tsx"></script>
    </body>
