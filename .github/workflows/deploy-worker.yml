name: Deploy multiplayer worker

# Deploys the Cloudflare Worker + Durable Object backend (worker/) that
# powers multiplayer. Separate from the frontend deploy: the worker has
# its own package + wrangler config, and the Astro site auto-builds on
# Cloudflare's side.
#
# Setup (one-time): add a repository secret CLOUDFLARE_API_TOKEN with a
# token scoped to "Edit Cloudflare Workers" for the account that owns
# the `jlhs-multiplayer` worker. CLOUDFLARE_ACCOUNT_ID is optional —
# only needed if the token can see more than one account.

on:
    push:
        branches: [master]
        paths:
            - "worker/**"
            - "protocol/**"
            - ".github/workflows/deploy-worker.yml"
    # Manual trigger so you can deploy without a worker-touching push
    # (e.g. to redeploy the current master).
    workflow_dispatch:

permissions:
    contents: read

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: 9
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm
                  cache-dependency-path: worker/pnpm-lock.yaml
            - name: Install worker dependencies
              working-directory: worker
              run: pnpm install --frozen-lockfile
            - name: Deploy to Cloudflare
              working-directory: worker
              run: pnpm wrangler deploy
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
