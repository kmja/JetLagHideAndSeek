# Cloudflare Worker config for the Overpass-boundary R2 cache.
#
# Why this exists: public Overpass mirrors occasionally hang or
# rate-limit, blocking the seeker app's "Loading play area" step.
# This worker sits in front of three independent mirrors, caches
# successful responses in R2 keyed by a hash of the query string,
# and serves subsequent identical requests from cache at single-
# digit-ms latency. A scheduled cron also pre-warms a curated list
# of popular cities once a week so first-time-in-region loads hit
# warm cache on day one.
#
# Lives in its own directory (not the repo root, not inside
# `worker/`) so each of the three Workers Builds projects has a
# clean root with one wrangler config.
#
# Deploy from `overpass-cache/` with:
#
#     pnpm run deploy        # = wrangler deploy --config wrangler.toml
#
# As with the multiplayer worker, the explicit `--config` is
# required so wrangler doesn't walk up and grab the frontend's
# repo-root config.
#
# Cloudflare Workers Builds setup for this worker:
#   • Root directory: overpass-cache
#   • Deploy command: node scripts/deploy.mjs
#
# The wrapper is a thin shim around `wrangler deploy --config
# wrangler.toml` that no-ops on non-master branches. Background:
# Workers Builds re-runs the deploy command on every branch push,
# but a preview deploy of this worker would need parallel R2
# bucket bindings + a parallel ADMIN_SECRET secret to be useful,
# and there isn't a clean way to declare those without manual
# dashboard work per branch. The shim avoids the problem — only
# master pushes ship; branch pushes log "skipped" and exit 0 so
# the Workers Build check stays green.
#
# R2 bucket needs to exist before first deploy:
#     wrangler r2 bucket create jlhs-overpass-cache
#
# The bucket can be created from the Cloudflare dashboard too —
# just match the `bucket_name` below.
#
# Secrets (configure via `wrangler secret put NAME` from this
# directory, NOT committed):
#     ADMIN_SECRET        — Bearer token for /admin/* endpoints.
#     TRAFIKLAB_API_KEY   — ResRobot 2.1 key for /api/journey/
#                           arrivals. Free signup at:
#                           https://www.trafiklab.se/api/our-apis/resrobot-v21/
#                           Optional — without it the journey
#                           endpoint returns 503 and the seeker
#                           app silently hides the Travel Times
#                           overlay labels.

name = "jlhs-overpass-cache"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

# R2 bucket binding. The binding name (`CACHE`) is what worker code
# references via `env.CACHE.get(...)`. Bucket name is the actual
# storage namespace on the account.
[[r2_buckets]]
binding = "CACHE"
bucket_name = "jlhs-overpass-cache"

# Hourly pre-warm. The candidate list grew to ~1350 cities and the
# scheduled handler drains BOTH the discovery (Photon name → OSM
# relation id) AND prewarm (relation → R2-cached boundary) queues
# per run. Hourly with the batch sizes below means a fresh bucket
# fills out in roughly 1 day of wall clock — fast enough to be
# useful, slow enough to stay friendly to the public Overpass
# mirrors that ultimately backstop a polygons.osm.fr miss.
[triggers]
crons = ["0 * * * *"]

# CORS allowlist for browser requests. The frontend worker's
# workers.dev URL is included by default; add a custom domain to
# this comma-separated list once one is wired up.
[vars]
ALLOWED_ORIGINS = "https://jetlaghideandseek.karl-mj-andersson.workers.dev,https://*-jetlaghideandseek.karl-mj-andersson.workers.dev,https://hideandseek.game,https://www.hideandseek.game,https://jetlaghideandseek.com,https://www.jetlaghideandseek.com,http://localhost:4321,http://localhost:3000,http://localhost:5173"
# Cache freshness. Boundaries change rarely on OSM — anything
# fresher than a month is fine to serve straight from R2.
CACHE_TTL_DAYS = "30"
# How many cities the cron pre-warms per run. Dropped 50 → 25 in
# v207 once we accepted that references can't usefully batch (each
# city's reference query has to be its own Overpass request). A
# 25-city tick now is:
#   - 3 boundary batches (10 cities each, last one short)
#   - 25 reference requests  ← the rate-limit bottleneck
#   - 5 HSR batches (5 cities each)
# = 33 upstream hits per tick, comfortably inside what overpass-
# api.de tolerates from a shared cloud-egress IP with 4 s pacing
# and 6 s phase pauses. 25 × 24 ticks/day = 600 cities/day → full
# ~1350-city list cycles every ~56 hours.
PREWARM_BATCH_SIZE = "25"
